<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSkills Social</title>
    <link rel="icon" type="image/x-icon" href="../images/uniskills-logo.ico">
    <link rel="stylesheet" href="../shared.css">

</head>

<body>
    <header class="navbar">
        <div class="logo">UniSkills Social</div>
        <div class="search-bar" style="display:flex; flex-grow:1; max-width:400px; margin: 0 20px;">
            <input type="text" data-ar-placeholder="البحث في المنتدى..." data-en-placeholder="Search forum..."
                placeholder="البحث في المنتدى..." onclick="window.location.href='../search/index.html'">
        </div>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 10px;">
            <a href="../home/index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
            <a href="../profile/index.html" data-ar="الملف الشخصي" data-en="Profile">الملف الشخصي</a>
            <button onclick="toggleTheme()" class="lang-btn" title="Toggle Theme">🌓</button>
            <button onclick="toggleLang(event)" class="btn btn-secondary" style="padding: 5px 10px; font-size: 14px;"
                data-ar="English" data-en="العربية">English</button>
            <a href="../login_register/index.html" data-ar="دخول/تسجيل" data-en="Login/Register">دخول/تسجيل</a>
        </nav>
    </header>
    <div class="layout-container" style="justify-content:center;">
        <main class="main-content" style="max-width:500px; margin: 50px auto;">
            <div class="container-box">
                <div style="display:flex; border-bottom:1px solid var(--border-color); margin-bottom:20px;">
                    <button id="tab-login" class="btn"
                        style="flex:1; border-radius:0; background:none; color:var(--accent); border-bottom:2px solid var(--accent);"
                        onclick="showTab('login')" data-ar="تسجيل الدخول" data-en="Login">تسجيل الدخول</button>
                    <button id="tab-register" class="btn"
                        style="flex:1; border-radius:0; background:none; color:var(--text-secondary);"
                        onclick="showTab('register')" data-ar="إنشاء حساب" data-en="Register">إنشاء حساب</button>
                </div>

                <form id="form-login"
                    onsubmit="event.preventDefault(); doLogin(document.getElementById('login_email').value.split('@')[0]);">
                    <div class="form-group"><label data-ar="البريد الإلكتروني" data-en="Email">البريد
                            الإلكتروني</label><input type="email" id="login_email" required></div>
                    <div class="form-group"><label data-ar="كلمة المرور" data-en="Password">كلمة المرور</label><input
                            type="password" required></div>
                    <button type="submit" class="btn" style="width:100%;" data-ar="دخول" data-en="Login">دخول</button>
                </form>

                <form id="form-register" style="display:none;"
                    onsubmit="event.preventDefault(); doLogin(document.getElementById('reg_username').value);">
                    <div class="form-group"><label data-ar="اسم المستخدم" data-en="Username">اسم المستخدم</label><input
                            type="text" id="reg_username" required></div>
                    <div class="form-group"><label data-ar="البريد الإلكتروني" data-en="Email">البريد
                            الإلكتروني</label><input type="email" required></div>
                    <div class="form-group"><label data-ar="كلمة المرور" data-en="Password">كلمة المرور</label><input
                            type="password" required></div>
                    <button type="submit" class="btn" style="width:100%;" data-ar="إنشاء حساب" data-en="Register">إنشاء
                        حساب</button>
                </form>

            </div>
        </main>
    </div>
    <script src="../shared.js"></script>
    <script src="script.js"></script>
</body>

</html>
