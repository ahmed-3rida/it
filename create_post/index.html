        <main class="main-content">
            <div class="container-box">
                <h2 class="accent-title" data-ar="إنشاء منشور جديد" data-en="Create New Post">إنشاء منشور جديد</h2>
                <form onsubmit="handlePostSubmit(event)">
                    <div class="form-group">
                        <label data-ar="عنوان المنشور" data-en="Post Title">عنوان المنشور</label>
                        <input type="text" data-ar-placeholder="اكتب عنواناً..." data-en-placeholder="Write title..." placeholder="اكتب عنواناً..." required>
                    </div>
                    <div class="form-group">
                        <label data-ar="المحتوى" data-en="Content">المحتوى</label>
                        <textarea rows="5" data-ar-placeholder="ماذا يدور في ذهنك؟" data-en-placeholder="What's on your mind?" placeholder="ماذا يدور في ذهنك؟"></textarea>
                    </div>
                    <div class="form-group">
                        <label data-ar="إرفاق وسائط (صورة / فيديو)" data-en="Attach Media">إرفاق وسائط (صورة / فيديو)</label>
                        <input type="file" accept="image/*,video/*">
                    </div>
                    <button type="submit" class="btn" id="postSubmitBtn" data-ar="نشر" data-en="Post">نشر</button>
                </form>
            </div>
        </main>
    </div>
    <script>
    function handlePostSubmit(event) {
        event.preventDefault();

        let titleInput = event.target.querySelector('input[type="text"]');
        let contentInput = event.target.querySelector('textarea');
        let fileInput = event.target.querySelector('input[type="file"]');
        
        let title = titleInput ? titleInput.value.trim() : '';
        let content = contentInput ? contentInput.value.trim() : '';
        let file = fileInput ? fileInput.files[0] : null;

        let btn = document.getElementById('postSubmitBtn');
        let lang = localStorage.getItem('site_lang') || 'ar';
        btn.innerText = lang === 'ar' ? 'جاري النشر...' : 'Posting...';
        btn.disabled = true;

        let savePost = (mediaUrl) => {
            if (title && content) {
                let posts = JSON.parse(localStorage.getItem('myPosts') || '[]');
                posts.push({ id: Date.now(), title: title, content: content, media: mediaUrl });
                try {
                    localStorage.setItem('myPosts', JSON.stringify(posts));
                } catch(e) {
                    console.error("Local storage might be full", e);
                }
            }
            showToast(lang === 'ar' ? 'تم نشر المنشور بنجاح!' : 'Posted successfully!', 'success');
            setTimeout(() => {
                window.location.href = '../user_dashboard/index.html';
            }, 1200);
        };

        if (file) {
            let reader = new FileReader();
            reader.onload = function(e) {
                savePost(e.target.result);
            };
            reader.readAsDataURL(file);
        } else {
            savePost(null);
        }
    }
    </script>
    <script src="../shared.js"></script>
</body>
